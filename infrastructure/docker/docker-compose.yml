services:
  postgres:
    image: postgres:16-alpine
    container_name: nexusai-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: nexusai
      POSTGRES_PASSWORD: nexusai
      POSTGRES_DB: nexusai
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: nexusai-redis
    restart: unless-stopped
    ports:
      - '6379:6379'

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: nexusai-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: nexusai
      RABBITMQ_DEFAULT_PASS: nexusai
    ports:
      - '5672:5672'
      - '15672:15672'

  qdrant:
    image: qdrant/qdrant:v1.12.5
    container_name: nexusai-qdrant
    restart: unless-stopped
    ports:
      - '6333:6333'
    volumes:
      - qdrant_data:/qdrant/storage

volumes:
  postgres_data:
  qdrant_data:
