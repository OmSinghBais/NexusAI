services:
  - type: web
    name: alterego-backend
    env: python
    plan: free
    
    buildCommand: pip install -r voice-system/backend/requirements.txt
    startCommand: cd voice-system/backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: OPENAI_API_KEY
        sync: false
      - key: MODEL_NAME
        value: gpt-4o-mini
      - key: ENVIRONMENT
        value: production
